<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultra Sneaker Store</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">SneakerStore</div>

<nav>

<a href="#">Home</a>
<a href="#">Campus</a>
<a href="#">Asian</a>

</nav>

<div class="icons">

<span>🔍</span>
<span>🛒</span>

</div>

</header>

<section class="hero">

<h1>Premium Sneakers</h1>

<p>Minimal • Aesthetic • Powerful</p>

<button onclick="scrollToProducts()">Explore</button>

</section>

<section class="card">

<div class="card" onclick="filterPrice()">

<img src="sneakers.jpeg">

<h3>Under ₹1000</h3>

</div>

<div class="card" onclick="filterCampus()">

<img src="campus-logo.png">

<h3>Campus</h3>

</div>

<div class="card" onclick="filterAsian()">

<img src="asian-logo.png">

<h3>Asian</h3>

</div>

<div class="card" onclick="filterRedtape()">

<img src="asian-logo.png">

<h3>Redtape</h3>

</div>

</section>

<div id="products"></div>

<section id="products" class="products"></section>

<section id="productView" class="product-view"></section>

<section id="checkout" class="checkout"></section>

<script src="script.js"></script>

</body>
</html>
